name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify version matches plugin header
        run: |
          PLUGIN_VERSION=$(grep -oP "Version:\s+\K[0-9.]+" sendtomp.php)
          if [ "$PLUGIN_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: Tag version (${{ steps.version.outputs.version }}) does not match plugin header version ($PLUGIN_VERSION)"
            exit 1
          fi

      - name: Build plugin ZIP
        run: |
          SLUG="sendtomp"
          VERSION="${{ steps.version.outputs.version }}"

          # Create a clean directory with the plugin slug as the folder name.
          mkdir -p "build/${SLUG}"

          # Copy plugin files (exclude dev/build files).
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='.env*' \
            --exclude='*.md' \
            --exclude='composer.*' \
            --exclude='package*.json' \
            --exclude='phpunit*' \
            --exclude='tests' \
            --exclude='.phpcs*' \
            --exclude='.editorconfig' \
            --exclude='.gitignore' \
            ./ "build/${SLUG}/"

          # Keep README.md (WordPress needs readme.txt but we'll include README.md too).
          cp README.md "build/${SLUG}/README.md" 2>/dev/null || true

          # Create the ZIP.
          cd build
          zip -r "../${SLUG}-${VERSION}.zip" "${SLUG}/"
          cd ..

          echo "ZIP created: ${SLUG}-${VERSION}.zip"
          ls -la "${SLUG}-${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sendtomp-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          body: |
            ## SendToMP v${{ steps.version.outputs.version }}

            ### Installation
            1. Download `sendtomp-${{ steps.version.outputs.version }}.zip`
            2. In WordPress admin: Plugins → Add New → Upload Plugin
            3. Upload the ZIP and activate

            ### Updating
            Plus and Pro subscribers receive automatic update notifications in WordPress.
            Free users can download the latest release from this page.

      - name: Register release in Bluetorch API
        if: vars.BLUETORCH_API_URL != ''
        continue-on-error: true
        env:
          API_URL: ${{ vars.BLUETORCH_API_URL }}
          API_KEY: ${{ secrets.BLUETORCH_RELEASE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/sendtomp-${VERSION}.zip"

          curl -sL -X POST "${API_URL}/api/releases/register" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${API_KEY}" \
            -d "{
              \"product_slug\": \"sendtomp\",
              \"version\": \"${VERSION}\",
              \"download_url\": \"${DOWNLOAD_URL}\",
              \"changelog\": \"See release notes at https://github.com/${{ github.repository }}/releases/tag/v${VERSION}\",
              \"requires_wp\": \"6.0\",
              \"tested_wp\": \"6.7\"
            }"
