name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify version matches plugin header and constant
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          HEADER_VERSION=$(grep -oP "Version:\s+\K[0-9.]+" sendtomp.php)
          CONSTANT_VERSION=$(grep -oP "SENDTOMP_VERSION',\s*'\K[0-9.]+" sendtomp.php)

          echo "Tag: ${TAG_VERSION}, Header: ${HEADER_VERSION}, Constant: ${CONSTANT_VERSION}"

          if [ "$HEADER_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag (${TAG_VERSION}) does not match plugin header (${HEADER_VERSION})"
            exit 1
          fi

          if [ "$CONSTANT_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag (${TAG_VERSION}) does not match SENDTOMP_VERSION constant (${CONSTANT_VERSION})"
            exit 1
          fi

      - name: Build plugin ZIP
        run: |
          SLUG="sendtomp"
          VERSION="${{ steps.version.outputs.version }}"

          # Create a clean directory with the plugin slug as the folder name.
          mkdir -p "build/${SLUG}"

          # Copy plugin files (exclude dev/build files).
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='.env*' \
            --exclude='*.md' \
            --exclude='composer.*' \
            --exclude='package*.json' \
            --exclude='phpunit*' \
            --exclude='tests' \
            --exclude='.phpcs*' \
            --exclude='.editorconfig' \
            --exclude='.gitignore' \
            --exclude='.mcp.json' \
            ./ "build/${SLUG}/"

          # Create the ZIP.
          cd build
          zip -r "../${SLUG}-${VERSION}.zip" "${SLUG}/"
          cd ..

          echo "ZIP created: ${SLUG}-${VERSION}.zip"
          ls -la "${SLUG}-${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sendtomp-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          body: |
            ## SendToMP v${{ steps.version.outputs.version }}

            ### Installation
            1. Download `sendtomp-${{ steps.version.outputs.version }}.zip`
            2. In WordPress admin: Plugins → Add New → Upload Plugin
            3. Upload the ZIP and activate

            ### Updating
            Updates are distributed via the WordPress.org plugin directory.
            You can also download the ZIP from this release page if you prefer to install manually.

      - name: Register release in Bluetorch API
        if: vars.BLUETORCH_API_URL != ''
        env:
          API_URL: ${{ vars.BLUETORCH_API_URL }}
          API_KEY: ${{ secrets.BLUETORCH_RELEASE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/sendtomp-${VERSION}.zip"

          HTTP_CODE=$(curl -sL -o /tmp/response.json -w "%{http_code}" \
            -X POST "${API_URL}/api/releases/register" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${API_KEY}" \
            -d "{
              \"product_slug\": \"sendtomp\",
              \"version\": \"${VERSION}\",
              \"download_url\": \"${DOWNLOAD_URL}\",
              \"changelog\": \"See release notes at https://github.com/${{ github.repository }}/releases/tag/v${VERSION}\",
              \"requires_wp\": \"6.0\",
              \"tested_wp\": \"6.7\"
            }")

          echo "HTTP ${HTTP_CODE}: $(cat /tmp/response.json)"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Release registration failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
